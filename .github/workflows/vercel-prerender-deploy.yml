name: Deploy (Prerender) to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: vercel-prerender-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (includes react-snap prerender)
        run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Upload prerendered build output (debug)
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output
          if-no-files-found: error

      - name: List prerendered HTML files (debug)
        run: |
          echo "HTML files in .vercel/output/static:"
          find .vercel/output/static -maxdepth 4 -type f -name "*.html" | sort | sed -n '1,200p'
          echo "Dirs in .vercel/output/static:"
          find .vercel/output/static -maxdepth 2 -type d | sort | sed -n '1,200p'

      - name: Deploy prebuilt to production
        run: npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
